<div class="inprogress-page">
  <div class="inprogress-shell">
    <aside class="steps-sidebar">
      <h3>Soumission</h3>
      <button
        *ngFor="let step of steps"
        type="button"
        class="step-item"
        [class.active]="currentStep === step.no"
        [disabled]="!isStepAccessible(step.no)"
        (click)="goToStep(step.no)"
      >
        Étape {{ step.no }}: {{ step.label }}
      </button>
    </aside>

    <section class="step-content">
      <header>
        <h1>Chemin candidature in progress</h1>
        <p *ngIf="titreOffre">
          <strong>{{ titreOffre }}</strong>
        </p>
      </header>

      <div *ngIf="currentStep === 1" class="step-panel">
        <h2>Informations personnelles</h2>
        <p *ngIf="isStepAccessible(2)" class="step-ok">
          ✅ Étape 1 validée automatiquement (profil inscrit)
        </p>
        <div class="grid-2">
          <div class="form-group">
            <label>Prénom</label>
            <input type="text" [(ngModel)]="personal.prenom" name="ip_prenom" />
          </div>
          <div class="form-group">
            <label>Nom</label>
            <input type="text" [(ngModel)]="personal.nom" name="ip_nom" />
          </div>
          <div class="form-group">
            <label>Email</label>
            <input type="email" [(ngModel)]="personal.email" name="ip_email" />
          </div>
          <div class="form-group">
            <label>Téléphone</label>
            <input type="text" [(ngModel)]="personal.telephone" name="ip_tel" />
          </div>
          <div class="form-group">
            <label>CIN</label>
            <input type="text" [(ngModel)]="personal.cin" name="ip_cin" />
          </div>
        </div>
      </div>

      <div *ngIf="currentStep === 2" class="step-panel">
        <h2>Diplômes</h2>
        <div class="table-like" *ngFor="let d of diplomes; let i = index">
          <input
            type="text"
            [(ngModel)]="d.intitule"
            [name]="'dip_int_' + i"
            placeholder="Intitulé diplôme"
          />
          <input
            type="text"
            [(ngModel)]="d.etablissement"
            [name]="'dip_eta_' + i"
            placeholder="Établissement"
          />
          <input type="text" [(ngModel)]="d.annee" [name]="'dip_ann_' + i" placeholder="Année" />
          <button type="button" class="btn-mini" (click)="removeDiplomeRow(i)">Supprimer</button>
        </div>
        <button type="button" class="btn-outline" (click)="addDiplomeRow()">
          + Ajouter diplôme
        </button>
      </div>

      <div *ngIf="currentStep === 3" class="step-panel">
        <h2>Attestations</h2>
        <div class="table-like" *ngFor="let a of attestations; let i = index">
          <input
            type="text"
            [(ngModel)]="attestations[i]"
            [name]="'att_' + i"
            placeholder="Nom attestation"
          />
          <button type="button" class="btn-mini" (click)="removeAttestationRow(i)">
            Supprimer
          </button>
        </div>
        <button type="button" class="btn-outline" (click)="addAttestationRow()">
          + Ajouter attestation
        </button>
      </div>

      <div *ngIf="currentStep === 4" class="step-panel">
        <h2>Mon parcours</h2>
        <textarea
          rows="6"
          [(ngModel)]="parcoursDescription"
          name="parcours_desc"
          placeholder="Décrivez votre parcours académique et professionnel..."
        ></textarea>
      </div>

      <div *ngIf="currentStep === 5" class="step-panel">
        <h2>Relevés de notes (tableau)</h2>
        <table class="notes-table">
          <thead>
            <tr>
              <th>Semestre</th>
              <th>Module</th>
              <th>Note</th>
              <th>Action</th>
            </tr>
          </thead>
          <tbody>
            <tr *ngFor="let r of releves; let i = index">
              <td><input type="text" [(ngModel)]="r.semestre" [name]="'rel_sem_' + i" /></td>
              <td><input type="text" [(ngModel)]="r.module" [name]="'rel_mod_' + i" /></td>
              <td><input type="text" [(ngModel)]="r.note" [name]="'rel_note_' + i" /></td>
              <td>
                <button type="button" class="btn-mini" (click)="removeReleveRow(i)">
                  Supprimer
                </button>
              </td>
            </tr>
          </tbody>
        </table>
        <button type="button" class="btn-outline" (click)="addReleveRow()">+ Ajouter ligne</button>
      </div>

      <div *ngIf="currentStep === 6" class="step-panel">
        <h2>Revue & Soumission</h2>
        <p>Vérifiez vos informations puis confirmez.</p>
        <label class="checkbox-line">
          <input type="checkbox" [(ngModel)]="confirmation" name="confirm_submit" />
          Je confirme que les informations sont correctes.
        </label>
      </div>

      <footer class="step-actions">
        <button
          type="button"
          class="btn-secondary"
          (click)="router.navigate(['/candidat/dashboard'])"
        >
          Retour dashboard
        </button>
        <button
          type="button"
          class="btn-outline"
          [disabled]="currentStep === 1"
          (click)="previousStep()"
        >
          Précédent
        </button>
        <button type="button" class="btn-primary" *ngIf="currentStep < 6" (click)="nextStep()">
          Suivant
        </button>
        <button
          type="button"
          class="btn-primary"
          *ngIf="currentStep === 6"
          [disabled]="isSubmitting"
          (click)="submitFinalCandidature()"
        >
          {{ isSubmitting ? 'Soumission...' : 'Soumettre candidature' }}
        </button>
      </footer>
    </section>
  </div>
</div>
