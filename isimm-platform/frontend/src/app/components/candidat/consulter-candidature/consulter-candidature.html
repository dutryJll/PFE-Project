<div class="consulter-candidature">
  <h2>Ma Candidature</h2>

  <div *ngIf="candidature" class="candidature-details">
    <p><strong>Type :</strong> {{ candidature.type_candidature }}</p>
    <p><strong>Statut :</strong> {{ candidature.statut }}</p>
    <p><strong>Score :</strong> {{ candidature.score }}/20</p>
  </div>

  <button [routerLink]="['/candidat/dashboard']">Retour au dashboard</button>
</div>
