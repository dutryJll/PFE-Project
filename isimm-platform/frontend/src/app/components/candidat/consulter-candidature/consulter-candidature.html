<div class="candidatures-page">
  <h1>Mes Candidatures</h1>

  <div class="candidatures-list" *ngIf="candidaturesFiltrees.length > 0">
    <div *ngFor="let candidature of candidaturesFiltrees" class="candidature-card">
      <h3>{{ candidature.first_name }} {{ candidature.last_name }}</h3>
      <p><strong>Type:</strong> {{ candidature.type_candidature }}</p>
      <p><strong>Statut:</strong> {{ candidature.statut }}</p>
      <p><strong>Score:</strong> {{ candidature.score || '--' }}/20</p>
    </div>
  </div>

  <div *ngIf="candidaturesFiltrees.length === 0" class="empty">
    <p>Aucune candidature</p>
  </div>
</div>
