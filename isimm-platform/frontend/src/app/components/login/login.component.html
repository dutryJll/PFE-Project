<div class="login-page">
  <div class="login-container">
    <div class="login-card">
      <!-- ✅ BOUTON RETOUR ACCUEIL -->
      <button class="btn-retour-accueil" (click)="retourAccueil()">
        <i class="fas fa-arrow-left"></i>
        Retour à l'accueil
      </button>
      <!-- Header avec logos -->
      <header class="login-header">
        <img
          src="https://via.placeholder.com/150x60/667eea/ffffff?text=ISIMM"
          alt="ISIMM"
          class="logo-isimm"
        />
        <img
          src="https://via.placeholder.com/150x60/764ba2/ffffff?text=Université"
          alt="Université"
          class="logo-universite"
        />
      </header>

      <!-- Contenu principal -->
      <div class="login-content">
        <h1 class="main-title">Plateforme d'Admission ISIMM</h1>
        <p class="subtitle">Sélectionnez votre espace</p>

        <!-- 3 Grands boutons -->
        <div class="espaces-container">
          <button class="espace-btn candidat" (click)="goToEspace('candidat')">
            <div class="espace-icon">🎓</div>
            <div class="espace-title">Espace Candidat</div>
          </button>

          <button class="espace-btn commission" (click)="goToEspace('commission')">
            <div class="espace-icon">👥</div>
            <div class="espace-title">Espace Commission</div>
          </button>

          <button class="espace-btn admin" (click)="goToEspace('admin')">
            <div class="espace-icon">⚙️</div>
            <div class="espace-title">Espace Administration</div>
          </button>
        </div>
      </div>

      <!-- Footer -->
      <footer class="login-footer">
        <p>© 2026 ISIMM - Tous droits réservés</p>
      </footer>
    </div>
  </div>
</div>
