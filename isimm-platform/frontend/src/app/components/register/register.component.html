<div class="register-container">
  <div class="register-card">
    <div class="register-header">
      <h1>ISIMM</h1>
      <p>Plateforme d'Admission</p>
    </div>

    <h2 class="register-title">Créer un compte</h2>

    <!-- Messages -->
    <div *ngIf="errorMessage" class="alert alert-danger">
      {{ errorMessage }}
    </div>

    <div *ngIf="successMessage" class="alert alert-success">
      {{ successMessage }}
    </div>

    <!-- Formulaire d'inscription -->
    <form (ngSubmit)="onRegister()">
      <!-- Rôle -->
      <div class="form-group">
        <label class="form-label">Type de compte</label>
        <select class="form-control" [(ngModel)]="formData.role" name="role">
          <option value="candidat">🎓 Candidat</option>
          <option value="commission">👥 Membre Commission</option>
          <option value="admin">⚙️ Administrateur</option>
          <option value="directeur">🏛️ Directeur</option>
          <option value="secretaire_general">📋 Secrétaire Général</option>
        </select>
      </div>

      <!-- Nom et Prénom -->
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Prénom</label>
          <input
            type="text"
            class="form-control"
            [(ngModel)]="formData.first_name"
            name="first_name"
            placeholder="Ahmed"
            required
          />
        </div>

        <div class="form-group">
          <label class="form-label">Nom</label>
          <input
            type="text"
            class="form-control"
            [(ngModel)]="formData.last_name"
            name="last_name"
            placeholder="Ben Ali"
            required
          />
        </div>
      </div>

      <!-- Email -->
      <div class="form-group">
        <label class="form-label">Email</label>
        <input
          type="email"
          class="form-control"
          [(ngModel)]="formData.email"
          name="email"
          placeholder="ahmed.benali@example.com"
          required
        />
      </div>

      <!-- Nom d'utilisateur -->
      <div class="form-group">
        <label class="form-label">Nom d'utilisateur</label>
        <input
          type="text"
          class="form-control"
          [(ngModel)]="formData.username"
          name="username"
          placeholder="ahmedbenali"
          required
        />
      </div>

      <!-- Mot de passe -->
      <div class="form-group">
        <label class="form-label">Mot de passe</label>
        <input
          type="password"
          class="form-control"
          [(ngModel)]="formData.password"
          name="password"
          placeholder="••••••••"
          required
        />
        <small class="form-text">Au moins 8 caractères</small>
      </div>

      <!-- Confirmation mot de passe -->
      <div class="form-group">
        <label class="form-label">Confirmer le mot de passe</label>
        <input
          type="password"
          class="form-control"
          [(ngModel)]="formData.password2"
          name="password2"
          placeholder="••••••••"
          required
        />
      </div>

      <button type="submit" class="btn btn-primary btn-block" [disabled]="isLoading">
        <span *ngIf="!isLoading">Créer mon compte</span>
        <span *ngIf="isLoading">Création en cours...</span>
      </button>
    </form>

    <div class="login-box">
      <p>Vous avez déjà un compte ?</p>
      <a routerLink="/login" class="login-link">Se connecter</a>
    </div>
  </div>
</div>
