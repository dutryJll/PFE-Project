<div class="guide-page">
  <!-- Header -->
  <header class="guide-header">
    <button class="btn-retour" (click)="retourAccueil()">
      <i class="fas fa-arrow-left"></i>
      Retour à l'accueil
    </button>
    <h1>📚 Guide de l'Étudiant</h1>
    <p>Tout ce que vous devez savoir sur le processus d'admission</p>
  </header>

  <div class="guide-container">
    <!-- Menu latéral -->
    <aside class="guide-sidebar">
      <div class="sidebar-title">
        <i class="fas fa-list"></i>
        <span>Sommaire</span>
      </div>

      <ul class="sections-menu">
        <li
          *ngFor="let section of sections"
          [class.active]="section.id === sectionActive"
          (click)="changerSection(section.id)"
        >
          <i class="fas" [ngClass]="section.icon"></i>
          <span>{{ section.titre }}</span>
        </li>
      </ul>
    </aside>

    <!-- Contenu principal -->
    <main class="guide-content">
      <div class="content-card">
        <div class="content-header">
          <i class="fas" [ngClass]="getSectionActive().icon"></i>
          <h2>{{ getSectionActive().titre }}</h2>
        </div>

        <div class="content-body">
          <p *ngFor="let paragraphe of getSectionActive().contenu" [innerHTML]="paragraphe"></p>
        </div>
      </div>
    </main>
  </div>
</div>
