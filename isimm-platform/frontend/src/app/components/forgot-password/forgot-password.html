<div class="forgot-container">
  <div class="forgot-card">
    <div class="forgot-header">
      <h1>ISIMM</h1>
      <p>Réinitialisation du mot de passe</p>
    </div>

    <h2 class="forgot-title">Mot de passe oublié ?</h2>

    <p class="forgot-description">
      Entrez votre adresse email et nous vous enverrons un lien pour réinitialiser votre mot de
      passe.
    </p>

    <!-- Message de succès -->
    <div *ngIf="successMessage" class="alert alert-success">
      {{ successMessage }}
    </div>

    <!-- Message d'erreur -->
    <div *ngIf="errorMessage" class="alert alert-danger">
      {{ errorMessage }}
    </div>

    <form (ngSubmit)="onSubmit()" *ngIf="!successMessage">
      <div class="form-group">
        <label class="form-label">Email</label>
        <input
          type="email"
          class="form-control"
          [(ngModel)]="email"
          name="email"
          placeholder="votre.email@example.com"
          required
        />
      </div>

      <button type="submit" class="btn btn-primary btn-block" [disabled]="isLoading">
        <span *ngIf="!isLoading">Envoyer le lien de réinitialisation</span>
        <span *ngIf="isLoading">Envoi en cours...</span>
      </button>
    </form>

    <div class="back-to-login">
      <a routerLink="/login">← Retour à la connexion</a>
    </div>
  </div>
</div>
