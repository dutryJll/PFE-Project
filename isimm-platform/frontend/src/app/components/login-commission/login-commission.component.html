<div class="login-commission-page">
  <button class="btn-back" (click)="goBack()">← Retour</button>

  <div class="login-card">
    <div class="header-icon">👥</div>
    <h2>Espace Commission</h2>
    <p class="subtitle">Connectez-vous avec vos identifiants</p>

    <div class="info-box">
      <i class="fas fa-info-circle"></i>
      <p>Vos identifiants vous ont été envoyés par email par l'administrateur</p>
    </div>

    <div *ngIf="errorMessage" class="alert alert-danger">
      {{ errorMessage }}
    </div>

    <form (ngSubmit)="onLogin()">
      <div class="form-group">
        <label>Nom d'utilisateur / Email</label>
        <input
          type="text"
          [(ngModel)]="username"
          name="username"
          placeholder="Entrez votre identifiant reçu par email"
          required
        />
      </div>

      <div class="form-group">
        <label>Mot de passe</label>
        <input
          type="password"
          [(ngModel)]="password"
          name="password"
          placeholder="••••••••"
          required
        />
      </div>

      <button type="submit" class="btn-login" [disabled]="isLoading">
        {{ isLoading ? 'Connexion...' : 'Se connecter' }}
      </button>
    </form>

    <div class="help-box">
      <p>Problème de connexion ?</p>
      <p class="help-text">Contactez l'administrateur : <strong>admin@isimm.tn</strong></p>
    </div>
  </div>
</div>
