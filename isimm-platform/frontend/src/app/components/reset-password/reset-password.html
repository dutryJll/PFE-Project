<div class="reset-container">
  <div class="reset-card">
    <div class="reset-header">
      <h1>ISIMM</h1>
      <p>Nouveau mot de passe</p>
    </div>

    <h2 class="reset-title">Créer un nouveau mot de passe</h2>

    <div *ngIf="successMessage" class="alert alert-success">
      {{ successMessage }}
      <br />
      <a routerLink="/login" class="btn btn-primary btn-block" style="margin-top: 1rem"
        >Se connecter</a
      >
    </div>

    <div *ngIf="errorMessage" class="alert alert-danger">
      {{ errorMessage }}
    </div>

    <form (ngSubmit)="onSubmit()" *ngIf="!successMessage">
      <div class="form-group">
        <label class="form-label">Nouveau mot de passe</label>
        <input
          type="password"
          class="form-control"
          [(ngModel)]="password"
          name="password"
          placeholder="••••••••"
          required
        />
        <small class="form-text">Au moins 8 caractères</small>
      </div>

      <div class="form-group">
        <label class="form-label">Confirmer le mot de passe</label>
        <input
          type="password"
          class="form-control"
          [(ngModel)]="password2"
          name="password2"
          placeholder="••••••••"
          required
        />
      </div>

      <button type="submit" class="btn btn-primary btn-block" [disabled]="isLoading">
        <span *ngIf="!isLoading">Réinitialiser le mot de passe</span>
        <span *ngIf="isLoading">Réinitialisation en cours...</span>
      </button>
    </form>
  </div>
</div>
